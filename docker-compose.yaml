services:
  app:
    build: .
    volumes:
      - ./src:/app/src
      - ./config.yaml:/app/config.yaml:ro
      - ./prompts:/app/prompts:ro
      - ./data:/app/data
    environment:
      - LOG_LEVEL=DEBUG
      - TZ=America/Detroit
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # # Intel GPU (OpenVINO):
    # devices:
    #   - /dev/dri/renderD128:/dev/dri/renderD128
    # group_add:
    #   - "991"
    # Nvidia GPU:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - web
    restart: unless-stopped

  web:
    build:
      context: ./web
    volumes:
      - ./web:/app
    ports:
      - "8972:8972"
    restart: unless-stopped
