<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dog Behavior Monitor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
header {
  background: #161b22;
  padding: 12px 16px;
  border-bottom: 1px solid #30363d;
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 12px;
}
h1 { font-size: 15px; font-weight: 600; }
#dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #484f58; margin-left: auto; flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
#dot.live { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
#feed { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.card {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 10px 12px; display: flex; gap: 10px; align-items: flex-start;
}
.thumb { width: 96px; height: 54px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
.no-thumb { width: 96px; height: 54px; border-radius: 4px; flex-shrink: 0; background: #21262d; }
.body { flex: 1; min-width: 0; }
.meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.score { font-size: 22px; font-weight: 700; line-height: 1; }
.low  { color: #3fb950; }
.mid  { color: #d29922; }
.high { color: #f85149; }
.time { font-size: 11px; color: #8b949e; margin-left: auto; }
.summary { font-size: 13px; color: #c9d1d9; font-weight: 500; margin-bottom: 2px; }
.detect { font-size: 11px; color: #6e7681; margin-bottom: 3px; }
.desc {
  font-size: 13px; color: #8b949e; line-height: 1.4;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 3; -webkit-box-orient: vertical;
}
.empty { text-align: center; color: #484f58; padding: 48px 16px; font-size: 14px; }
#cameras {
  background: #161b22; border-bottom: 1px solid #30363d;
  padding: 5px 16px; display: none; flex-wrap: wrap; gap: 12px;
}
#cameras.visible { display: flex; }
.cam { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #8b949e; }
.cam-dot { width: 6px; height: 6px; border-radius: 50%; background: #484f58; flex-shrink: 0; }
.cam-dot.ok  { background: #3fb950; }
.cam-dot.err { background: #f85149; }
.card.has-thumb { cursor: pointer; }
.card.has-thumb:hover { border-color: #8b949e; }
#modal {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
}
#modal.open { display: flex; }
#modal img { max-width: 92vw; max-height: 92vh; border-radius: 6px; object-fit: contain; }
</style>
</head>
<body>
<header>
  <span>🐕</span>
  <h1>Dog Behavior Monitor</h1>
  <span id="dot"></span>
</header>
<div id="cameras"></div>
<div id="feed"><p class="empty">No results yet</p></div>
<div id="modal"><img id="modal-img" src="" alt=""></div>
<script>
const feed = document.getElementById('feed');
const dot  = document.getElementById('dot');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modal-img');
let populated = false;

modal.addEventListener('click', () => modal.classList.remove('open'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.classList.remove('open'); });

function openModal(src) {
  modalImg.src = src;
  modal.classList.add('open');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function scoreClass(s) { return s >= 7 ? 'high' : s >= 4 ? 'mid' : 'low'; }
function fmtTime(t) {
  const d = new Date(t);
  return isNaN(d) ? t : d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'});
}

function fmtCamera(cam) {
  return cam.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function addCard(e) {
  if (!populated) { feed.innerHTML = ''; populated = true; }
  const d = document.createElement('div');
  d.className = 'card';
  const img = e.thumb
    ? `<img class="thumb" src="data:image/jpeg;base64,${e.thumb}">`
    : `<div class="no-thumb"></div>`;
  const timeStr = e.inference_time != null
    ? `${fmtTime(e.time)} · ${e.inference_time.toFixed(1)}s`
    : fmtTime(e.time);
  const summary = e.summary
    ? `<p class="summary">${esc(e.summary)}</p>`
    : '';
  const detect = (e.cameras && e.cameras.length && e.detected_by)
    ? `<p class="detect">${e.cameras.map(fmtCamera).join(', ')} ${esc(e.detected_by) === "YOLO" ? "" : "(LLM-detected)"}</p>`
    : '';
  d.innerHTML = `
    ${img}
    <div class="body">
      <div class="meta">
        <span class="score ${scoreClass(e.score)}">${e.score}</span>
        <span class="time">${timeStr}</span>
      </div>
      ${summary}
      ${detect}
      <p class="desc">${esc(e.description)}</p>
    </div>`;
  if (e.thumb) {
    d.classList.add('has-thumb');
    d.addEventListener('click', () => openModal(`data:image/jpeg;base64,${e.thumb}`));
  }
  feed.prepend(d);
}

function updateCameras(status) {
  const div = document.getElementById('cameras');
  div.className = 'visible';
  div.innerHTML = Object.entries(status)
    .map(([name, ok]) => `<span class="cam"><span class="cam-dot ${ok ? 'ok' : 'err'}"></span>${fmtCamera(name)}</span>`)
    .join('');
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen  = () => dot.className = 'live';
  ws.onclose = () => { dot.className = ''; setTimeout(connect, 3000); };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'history') { msg.entries.forEach(addCard); return; }
    if (msg.type === 'cameras') { updateCameras(msg.status); return; }
    addCard(msg.entry);
  };
}
connect();
</script>
</body>
</html>
